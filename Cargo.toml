[workspace]
resolver = "2"
members = [
    "spyder-driver",
    "spyder-display",
    "spyder-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/christian/spyder"

[workspace.dependencies]
rusb = "0.9"
rand = "0.8"
thiserror = "1"
