name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
      # tristim-gui is workspace-excluded, so --all skips it; check it separately.
      - run: cargo fmt --manifest-path tristim-gui/Cargo.toml --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # rusb links libusb; smithay-client-toolkit / wayland-client link
      # libwayland + libxkbcommon. pkg-config lets the *-sys crates find them.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libwayland-dev libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      # tristim-gui is workspace-excluded (own manifest + Cargo.lock); lint it too.
      - run: cargo clippy --manifest-path tristim-gui/Cargo.toml --all-targets --locked -- -D warnings

  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libwayland-dev libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --all-targets --locked
      - name: Run tests
        run: cargo test --workspace --locked

  # tristim-gui is excluded from the workspace (its damascene + GPU/winit tree is
  # kept out of the lockfile the jobs above resolve), so it needs its own job
  # against its own manifest + Cargo.lock. damascene is a crates.io dep, so CI can
  # fetch it; the system deps match (winit -> wayland/xkb, rusb -> libusb).
  build-test-gui:
    name: Build + Test (GUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libwayland-dev libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build tristim-gui
        run: cargo build --manifest-path tristim-gui/Cargo.toml --all-targets --locked
      - name: Run tristim-gui tests
        run: cargo test --manifest-path tristim-gui/Cargo.toml --locked
