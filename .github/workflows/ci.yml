name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # rusb links libusb; smithay-client-toolkit / wayland-client link
      # libwayland + libxkbcommon. pkg-config lets the *-sys crates find them.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libwayland-dev libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libusb-1.0-0-dev libwayland-dev libxkbcommon-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --all-targets --locked
      - name: Run tests
        run: cargo test --workspace --locked
      # Headless layout lint: build every presenter state over the reference
      # capture and fail on any damascene lint finding (overflow, clipped
      # text, spacing smells, raw colors). No compositor in CI: the setup
      # form's output/capability queries fall back to their empty/error rows,
      # which are themselves lint-checked states. The dump binary was already
      # compiled by the --all-targets build above.
      - name: Bundle-dump layout lint
        run: cargo run -p tristim-gui --bin dump --locked -- tristim-gui/fixtures/reference-capture.json tristim-gui/out
      # On lint failure, keep the SVG / tree / draw-ops artifacts so the
      # offending layout can be inspected without reproducing locally.
      - name: Upload bundle-dump artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-dump
          path: tristim-gui/out/
